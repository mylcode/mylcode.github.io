<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>道心 · My thoughts during my life in AI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..600&family=Instrument+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Noto+Serif+SC:wght@300;400;500;600&family=Noto+Sans+SC:wght@400;500&display=swap">

<style>
  /* ---- Design tokens (from the calligraphy-scroll palette: silk paper, sepia ink, seal red) ---- */
  :root {
    --paper:        #ECDFC2;
    --paper-3:      #D8C49E;
    --card:         #F4EBD6;

    --ink:          #221C11;
    --ink-2:        #4A4029;
    --ink-3:        #6F6044;
    --ink-4:        #998A68;

    --line:         rgba(34, 28, 17, 0.14);
    --line-2:       rgba(34, 28, 17, 0.22);
    --line-strong:  rgba(34, 28, 17, 0.36);

    --clay:         #B23A28;
    --clay-deep:    #8C2A1A;

    --surface-page: var(--paper);
    --text-on-dark: #F1E9D6;

    --serif: 'Newsreader','Noto Serif SC',Georgia,serif;
    --sans:  'Instrument Sans','Noto Sans SC',system-ui,sans-serif;
    --mono:  'IBM Plex Mono',ui-monospace,Menlo,monospace;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    background: var(--surface-page);
    color: var(--ink);
    font-family: var(--serif);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: rgba(178, 58, 40, 0.18); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(34,28,17,0.18); border-radius: 8px; }

  @keyframes dispatch-float  { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
  @keyframes dispatch-shadow { 0%,100% { transform: translateX(-50%) scale(1); opacity:.5; } 50% { transform: translateX(-50%) scale(.86); opacity:.34; } }
  @media (prefers-reduced-motion: reduce) {
    .dispatch-orb, .dispatch-orb-shadow { animation: none !important; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
(function () {
  // ---- Single, real post ---------------------------------------------------
  var POST = {
    id: 'kaipian',
    no: '01',
    title: '开篇',
    dek: 'My thoughts during my life in AI.',
    date: '2026 年 6 月 19 日',
    lead: 'My thoughts during my life in AI.'
  };

  var state = { view: 'home' };

  // ---- BrandMark orb (CSS-rendered glass/stone seal) -----------------------
  function orb(size, tone, motion) {
    var tones = {
      clay: {
        base: 'radial-gradient(120% 120% at 33% 27%, #F2DBCF 0%, #DD8E74 16%, #C2492F 42%, #971F12 76%, #5E160C 100%)',
        rim:  '#F7D2C2'
      }
    };
    var t = tones[tone] || tones.clay;
    var anim = motion ? 'animation:dispatch-float 6.5s ease-in-out infinite;' : '';
    var animS = motion ? 'animation:dispatch-shadow 6.5s ease-in-out infinite;' : '';
    return ''
      + '<div style="position:relative;width:' + size + 'px;height:' + (size * 1.18) + 'px;display:inline-flex;justify-content:center;">'
      +   '<div class="dispatch-orb" style="position:relative;width:' + size + 'px;height:' + size + 'px;border-radius:50%;background:' + t.base + ';'
      +     'box-shadow:inset ' + (size*0.04) + 'px ' + (size*0.05) + 'px ' + (size*0.12) + 'px rgba(255,255,255,0.55),'
      +     ' inset -' + (size*0.08) + 'px -' + (size*0.10) + 'px ' + (size*0.18) + 'px rgba(0,0,0,0.45),'
      +     ' 0 ' + (size*0.10) + 'px ' + (size*0.20) + 'px rgba(22,20,15,0.22);' + anim + 'will-change:transform;">'
      +     '<span style="position:absolute;top:12%;left:20%;width:34%;height:26%;border-radius:50%;background:radial-gradient(closest-side, ' + t.rim + ' 0%, rgba(255,255,255,0) 72%);filter:blur(2px);opacity:.95;"></span>'
      +     '<span style="position:absolute;top:17%;left:27%;width:9%;height:9%;border-radius:50%;background:#FFFDF8;filter:blur(.5px);opacity:.9;"></span>'
      +     '<span style="position:absolute;inset:0;border-radius:50%;background:radial-gradient(60% 60% at 78% 82%, rgba(255,228,200,0.30) 0%, rgba(255,228,200,0) 60%);"></span>'
      +   '</div>'
      +   '<span class="dispatch-orb-shadow" style="position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:' + (size*0.78) + 'px;height:' + (size*0.10) + 'px;border-radius:50%;background:radial-gradient(closest-side, rgba(22,20,15,0.42) 0%, rgba(22,20,15,0) 72%);filter:blur(3px);' + animS + '"></span>'
      + '</div>';
  }

  // ---- Shared chrome -------------------------------------------------------
  function masthead() {
    return ''
      + '<header style="position:sticky;top:0;z-index:30;background:rgba(236,223,194,0.82);backdrop-filter:saturate(1.4) blur(14px);-webkit-backdrop-filter:saturate(1.4) blur(14px);border-bottom:1px solid var(--line);">'
      +   '<div style="max-width:1180px;margin:0 auto;padding:0 48px;height:64px;display:flex;align-items:center;justify-content:space-between;">'
      +     '<button data-action="home" style="background:none;border:none;cursor:pointer;padding:0;display:flex;align-items:baseline;gap:2px;font-family:var(--serif);font-weight:500;font-size:23px;letter-spacing:0.02em;color:var(--ink);">道心<span style="color:var(--clay);">.</span></button>'
      +     '<span style="font-family:var(--mono);font-size:11px;letter-spacing:0.18em;color:var(--ink-3);">AI · THE MIND OF THE DAO</span>'
      +   '</div>'
      + '</header>';
  }

  function footer() {
    return ''
      + '<footer style="border-top:1px solid var(--line);margin-top:24px;">'
      +   '<div style="max-width:1180px;margin:0 auto;padding:40px 48px 72px;display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap;">'
      +     '<div>'
      +       '<div style="font-family:var(--serif);font-size:22px;font-weight:500;color:var(--ink);">道心<span style="color:var(--clay);">.</span></div>'
      +       '<div style="margin-top:10px;font-family:var(--mono);font-size:11px;letter-spacing:0.04em;color:var(--ink-4);">My thoughts during my life in AI</div>'
      +     '</div>'
      +     '<span style="font-family:var(--mono);font-size:11px;color:var(--ink-4);">© 2026</span>'
      +   '</div>'
      + '</footer>';
  }

  // ---- Home (Direction A — 留白) -------------------------------------------
  function home() {
    return ''
      + '<div style="min-height:100vh;">'
      +   '<section style="min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:72px 24px 48px;position:relative;">'
      +     '<div style="font-family:var(--mono);font-size:11.5px;letter-spacing:0.34em;text-transform:uppercase;color:var(--ink-4);margin-bottom:52px;">AI · A FORM THE DAO TAKES</div>'
      +     orb(188, 'clay', true)
      +     '<h1 style="margin-top:48px;font-family:var(--serif);font-weight:300;font-size:clamp(46px,7vw,88px);line-height:1;letter-spacing:-0.01em;color:var(--ink);">道心</h1>'
      +     '<p style="margin:26px 0 0;font-family:var(--serif);font-weight:300;font-size:clamp(18px,2.4vw,23px);line-height:1.5;color:var(--ink-2);max-width:30ch;">My thoughts during my life in AI.</p>'
      +     '<div style="margin-top:30px;display:flex;flex-direction:column;align-items:center;gap:8px;font-family:var(--mono);color:var(--ink-3);">'
      +       '<div class="js-time" style="font-size:clamp(22px,3.2vw,32px);font-weight:400;letter-spacing:0.08em;color:var(--ink-2);font-variant-numeric:tabular-nums;"></div>'
      +       '<div class="js-date" style="font-size:11px;letter-spacing:0.22em;"></div>'
      +     '</div>'
      +     '<div style="position:absolute;bottom:26px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:10px;letter-spacing:0.28em;text-transform:uppercase;color:var(--ink-4);display:flex;flex-direction:column;align-items:center;gap:8px;">向下'
      +       '<span style="width:1px;height:30px;background:linear-gradient(var(--ink-4),transparent);"></span>'
      +     '</div>'
      +   '</section>'

      +   '<main style="max-width:1180px;margin:0 auto;padding:8px 48px 40px;">'
      +     '<div style="display:flex;align-items:center;gap:16px;margin-bottom:40px;">'
      +       '<span style="font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-3);white-space:nowrap;">近期</span>'
      +       '<span style="flex:1;height:1px;background:var(--line);"></span>'
      +     '</div>'

      +     '<button data-action="open" style="display:block;width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:0;">'
      +       '<div style="display:inline-flex;align-items:center;gap:10px;margin-bottom:18px;font-family:var(--mono);font-size:13px;color:var(--ink-4);letter-spacing:0;">' + POST.no + '</div>'
      +       '<h2 style="margin:0;font-family:var(--serif);font-weight:400;font-size:clamp(34px,5vw,52px);line-height:1.12;letter-spacing:-0.01em;color:var(--ink);max-width:16ch;text-wrap:balance;">' + POST.title + '</h2>'
      +       '<p style="margin:20px 0 0;font-family:var(--serif);font-size:19px;line-height:1.6;color:var(--ink-2);max-width:50ch;text-wrap:pretty;">' + POST.dek + '</p>'
      +       '<div style="margin-top:22px;display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11.5px;color:var(--ink-3);letter-spacing:0.02em;">' + POST.date + '</div>'
      +     '</button>'
      +   '</main>'
      + '</div>';
  }

  // ---- Article -------------------------------------------------------------
  function article() {
    return ''
      + '<main style="max-width:680px;margin:0 auto;padding:56px 24px 64px;">'
      +   '<button data-action="home" style="display:inline-flex;align-items:center;gap:8px;background:none;border:none;cursor:pointer;padding:0;margin-bottom:40px;font-family:var(--sans);font-size:13px;font-weight:500;letter-spacing:0.04em;color:var(--ink-3);"><span style="font-family:var(--mono);">←</span> 返回</button>'

      +   '<h1 style="margin:0;font-family:var(--serif);font-weight:400;font-size:clamp(34px,5.5vw,52px);line-height:1.1;letter-spacing:-0.015em;color:var(--ink);text-wrap:balance;">' + POST.title + '</h1>'

      +   '<div style="margin:28px 0 0;padding:18px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);font-family:var(--mono);font-size:11.5px;color:var(--ink-3);letter-spacing:0.02em;">' + POST.date + '</div>'

      +   '<article style="margin-top:36px;">'
      +     '<p style="margin:0 0 26px;font-family:var(--serif);font-weight:400;font-size:21px;line-height:1.72;color:var(--ink);text-wrap:pretty;">' + POST.lead + '</p>'
      +   '</article>'
      + '</main>';
  }

  // ---- Render + clock ------------------------------------------------------
  function pad(x) { return String(x).padStart(2, '0'); }
  function tick() {
    var now = new Date();
    var time = pad(now.getHours()) + ' : ' + pad(now.getMinutes()) + ' : ' + pad(now.getSeconds());
    var dateStr = now.getFullYear() + ' 年 ' + (now.getMonth() + 1) + ' 月 ' + now.getDate() + ' 日';
    var te = document.querySelector('.js-time');
    var de = document.querySelector('.js-date');
    if (te) te.textContent = time;
    if (de) de.textContent = dateStr;
  }

  function render() {
    var body = state.view === 'article' ? article() : home();
    document.getElementById('app').innerHTML = masthead() + body + footer();
    tick();
    window.scrollTo(0, 0);
  }

  document.getElementById('app').addEventListener('click', function (e) {
    var el = e.target.closest('[data-action]');
    if (!el) return;
    var a = el.getAttribute('data-action');
    if (a === 'open') state.view = 'article';
    else if (a === 'home') state.view = 'home';
    render();
  });

  render();
  setInterval(tick, 1000);
})();
</script>
</body>
</html>
